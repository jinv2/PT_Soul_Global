<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTVoice Pro | Shensist Matrix</title>
    <style>
        :root { --shensist-green: #00ff00; }
        body { background: #000; color: var(--shensist-green); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        
        /* 💎 核心视觉：圆圈光环 */
        .logo-box { position: relative; width: 160px; height: 160px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        .outer-ring { position: absolute; width: 100%; height: 100%; border: 3px solid var(--shensist-green); border-radius: 50%; box-shadow: 0 0 25px var(--shensist-green); animation: pulse 2s infinite alternate; }
        
        /* 🚀 灵魂逻辑：使用滤镜将 LOGO 强制转为神思绿并去除白框 */
        .inner-logo { 
            width: 100px; 
            z-index: 2;
            /* 关键：通过滤镜将黑色/深色图形转为发光的绿色 */
            filter: drop-shadow(0 0 8px var(--shensist-green)) brightness(1.2) contrast(1.2);
        }

        h1 { letter-spacing: 4px; font-size: 2em; text-shadow: 0 0 15px var(--shensist-green); margin: 20px 0; }
        p { font-size: 0.9em; opacity: 0.8; max-width: 85%; }
        .badge { background: var(--shensist-green); color: #000; padding: 2px 8px; font-weight: bold; }
        
        a { color: var(--shensist-green); text-decoration: none; border: 1px solid var(--shensist-green); padding: 15px 30px; margin-top: 40px; display: inline-block; transition: 0.3s; box-shadow: 0 0 10px var(--shensist-green); }
        a:hover { background: var(--shensist-green); color: #000; box-shadow: 0 0 30px var(--shensist-green); }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--shensist-green); }
            100% { transform: scale(1.05); box-shadow: 0 0 35px var(--shensist-green); }
        }
    </style>
</head>
<body>
    <div class="logo-box">
        <div class="outer-ring"></div>
        <img src="assets/logo_ts.webp" class="inner-logo" alt="Shensist Logo">
    </div>
