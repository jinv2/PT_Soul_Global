<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shensist Matrix | PTVoice Pro Licensing</title>
    <style>
        :root { --shensist-green: #00ff00; --shensist-dark: #0a0a0a; }
        body { background: #000; color: var(--shensist-green); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        
        /* �� 核心视觉：LOGO 圆圈封装与呼吸动画 */
        .logo-container { position: relative; width: 150px; height: 150px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        .logo-circle { position: absolute; width: 100%; height: 100%; border: 2px solid var(--shensist-green); border-radius: 50%; box-shadow: 0 0 15px var(--shensist-green); animation: pulse 2s infinite alternate; }
        .logo-img { width: 80px; filter: drop-shadow(0 0 5px var(--shensist-green)); } /* 让 LOGO 自身也带有光晕 */

        h1 { letter-spacing: 5px; font-size: 1.5em; text-shadow: 0 0 10px var(--shensist-green); margin-bottom: 50px; }
        p { font-size: 0.9em; line-height: 1.6; max-width: 80%; }
        
        /* 按钮与页脚 */
        a { color: var(--shensist-green); text-decoration: none; border: 1px solid var(--shensist-green); padding: 12px 24px; margin-top: 30px; font-size: 0.8em; transition: 0.3s; box-shadow: 0 0 5px var(--shensist-green); }
        a:hover { background: var(--shensist-green); color: #000; box-shadow: 0 0 20px var(--shensist-green); }
        .footer { font-size: 0.7em; margin-top: 60px; opacity: 0.7; }
        
        /* 💫 呼吸动画定义 */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--shensist-green); opacity: 0.8; }
            100% { transform: scale(1.03); box-shadow: 0 0 25px var(--shensist-green); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-circle"></div>
        <img src="assets/logo_ts.webp" alt="Shensist Logo" class="logo-img">
    </div>

    <h1>SHENSIST MATRIX : PTVOICE PRO</h1>
    
    <p>📡 状态: <span style="background: var(--shensist-green); color: #000; padding: 2px 5px;">ACTIVE</span></p>
    <p>0元试用版授权已在全球节点同步激活。<br>未检测到本地 Mock 服务器，已成功连接 ptvoice.shensist.top 云端大脑。</p>
    
    <a href="https://github.com/jinv2/PT_Soul_Global/releases">前往 GitHub 获取发行版</a>
    
    <p class="footer">© 2026 Shensist Matrix. Visit [ https://shensist.top/ ] for more.</p>
</body>
</html>
