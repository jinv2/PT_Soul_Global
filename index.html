<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTVoice Pro | Shensist Matrix</title>
    <style>
        :root { --shensist-green: #00ff00; --shensist-bg: #000; }
        body { background: var(--shensist-bg); color: var(--shensist-green); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; overflow: hidden; }
        
        /* 💎 LOGO 核心 */
        .logo-box { position: relative; width: 150px; height: 150px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .outer-ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--shensist-green); border-radius: 50%; box-shadow: 0 0 20px var(--shensist-green); animation: pulse 2s infinite alternate; }
        .inner-logo-wrapper { width: 120px; height: 120px; background: #fff; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; mix-blend-mode: screen; filter: drop-shadow(0 0 10px var(--shensist-green)); }
        .inner-logo { width: 110%; filter: invert(1) sepia(1) saturate(10000%) hue-rotate(80deg); }

        h1 { letter-spacing: 5px; font-size: 2.5em; text-shadow: 0 0 15px var(--shensist-green); margin: 20px 0; }
        .badge { background: var(--shensist-green); color: #000; padding: 2px 10px; font-weight: bold; font-size: 0.9em; }

        /* 🚀 交互按钮组 */
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { text-decoration: none; padding: 15px 40px; font-weight: bold; transition: 0.3s; cursor: pointer; border: 1px solid var(--shensist-green); }
        .btn-main { background: none; color: var(--shensist-green); box-shadow: 0 0 15px var(--shensist-green); font-size: 1.1em; }
        .btn-main:hover { background: var(--shensist-green); color: #000; box-shadow: 0 0 35px var(--shensist-green); }
        .btn-sub { font-size: 0.8em; opacity: 0.7; color: var(--shensist-green); border: none; background: none; text-decoration: underline; }
        .btn-sub:hover { opacity: 1; }

        /* 📁 弹出窗口 (Modal) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--shensist-green); width: 90%; max-width: 500px; padding: 30px; text-align: left; box-shadow: 0 0 50px rgba(0,255,0,0.2); position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: var(--shensist-green); }
        .step { margin-bottom: 20px; border-left: 2px solid var(--shensist-green); padding-left: 15px; }
        .step-title { color: #fff; font-size: 1em; margin-bottom: 5px; font-weight: bold; }
        .step-desc { font-size: 0.8em; opacity: 0.8; line-height: 1.5; }
        code { color: #ffca28; }

        .footer { font-size: 0.7em; margin-top: 60px; opacity: 0.4; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="logo-box">
        <div class="outer-ring"></div>
        <div class="inner-logo-wrapper">
            <img src="assets/logo_ts.webp" class="inner-logo" alt="Shensist Logo">
        </div>
    </div>

    <h1>PTVoice Pro</h1>
    <p>📡 云端授权: <span class="badge">ptvoice.shensist.top</span></p>
    
    <div class="controls">
        <a href="https://github.com/jinv2/PT_Soul_Global/releases/latest/download/PTVoice_Mac_Global_v1.zip" class="btn btn-main">⚡ 立即获取 MacOS 发行版</a>
        <button class="btn btn-sub" onclick="openModal()">查看极客安装教程 (Gatekeeper 解锁)</button>
    </div>

    <div id="tutorialModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--shensist-green); font-size:1.2em; border-bottom:1px solid; padding-bottom:10px;">🛡️ 权限解锁指南</h2>
            
            <div class="step">
                <div class="step-title">1. 解压资产</div>
                <div class="step-desc">解压 Zip 包，确保 <code>install.command</code> 与 App 处于同一目录。</div>
            </div>
            <div class="step">
                <div class="step-title">2. 执行解锁 (关键)</div>
                <div class="step-desc">右键点击 <code>install.command</code> 选择<b>“用终端打开”</b>。输入开机密码回车，彻底清除苹果隔离锁。</div>
            </div>
            <div class="step">
                <div class="step-title">3. 运行环境</div>
                <div class="step-desc">双击运行程序。看到桌面顶部<b>绿色呼吸 LOGO</b> 即代表 0 元授权已从云端同步。</div>
            </div>
            
            <button onclick="closeModal()" style="width:100%; padding:10px; background:var(--shensist-green); color:#000; border:none; font-weight:bold; cursor:pointer; margin-top:10px;">我已了解</button>
        </div>
    </div>

    <p class="footer">© 2026 Shensist Matrix. OFFICIAL: https://shensist.top/</p>

    <script>
        const modal = document.getElementById("tutorialModal");
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        // 点击弹窗外部关闭
        window.onclick = function(event) { if (event.target == modal) { closeModal(); } }
    </script>
</body>
</html>
